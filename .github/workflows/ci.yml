name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---- Node (Nuxt) ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend deps
        run: |
          cd nuxt-app
          npm install

      - name: Build Nuxt app
        run: |
          cd nuxt-app
          npm run build

      # ---- Python backend ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install backend deps
        run: |
          cd python-backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd python-backend
          pytest